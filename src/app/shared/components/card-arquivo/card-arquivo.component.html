<div class="card-arquivo">
    <div class="info-archive">
        <h3> {{ index }} {{ title }}</h3>
        <div class="autores">
            <h5>{{ autores | nomeAutor }}</h5>
        </div>
        <p>{{ description }}</p>
        <span> {{ yearPublication }}</span>
    </div>
    <div>
        <a class="btnArchive" target="_blank" [href]=urlArchive>
            <mat-icon>login</mat-icon>Acessar</a>
    </div>
</div>
