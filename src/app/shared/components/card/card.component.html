<div class="card">
    <div class="icon" >
        <img [src]="cardIcon" width="100" height="100" alt="">
    </div>
    <div class="title">
        <b>{{title}}</b>
    </div>
    <div class="description">
        {{description}}
    </div>
    <div>
        <app-button-primary [ariaLabelText]="ariaLabelText" rel="noopener noreferrer" [text]="'Confira'" [route]="'/buscador'"></app-button-primary>
    </div>
</div>
