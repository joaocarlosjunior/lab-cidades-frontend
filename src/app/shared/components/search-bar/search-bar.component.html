<div class="search-bar-container">
  <button
    mat-icon-button
    (click)="setSubjectSearch(searchInput.value)"
    [ariaLabel]="'Botão de pesquisar'"
  >
    <mat-icon>search</mat-icon>
  </button>
  <input
    #searchInput
    placeholder="O que você está procurando?"
    (keyup.enter)="setSubjectSearch(searchInput.value)"
  />
</div>
