<div class="filtros">
  <mat-form-field appearance="outline">
    <mat-label>Buscar Cidade</mat-label>
    <input
      matInput
      (keyup.enter)="searchByCityName($event)"
      placeholder="Digite Nome Cidade"
      #input
    />
  </mat-form-field>
</div>

<div class="table-wrapper">
  <div class="mat-elevation-z8 margin">
    <table mat-table [dataSource]="localityDataSource" matSort>
      <!-- ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <!-- Nome Cidade -->
      <ng-container matColumnDef="nomeCidade">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome Cidade</th>
        <td mat-cell *matCellDef="let element">{{ element.nome_cidade }}</td>
      </ng-container>

      <!-- Estado -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Estado
        </th>
        <td mat-cell *matCellDef="let element">{{ element.estado.nome_estado }}</td>
      </ng-container>

      <!-- Mesorregiao -->
      <ng-container matColumnDef="mesorregiao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Mesorregião</th>
        <td mat-cell *matCellDef="let element">
          {{ element.mesorregiao.nome_mesorregiao }}
        </td>
      </ng-container>

      <!-- Criado Em -->
      <ng-container matColumnDef="criadoEm">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Data Criação</th>
        <td mat-cell *matCellDef="let element">{{ element.created_at }}</td>
      </ng-container>

      <!-- Atualizado Em -->
      <ng-container matColumnDef="atualizadoEm">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Data Atualização
        </th>
        <td mat-cell *matCellDef="let element">{{ element.updated_at }}</td>
      </ng-container>

      <!-- Ações -->
      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Ação</th>
        <td *matCellDef="let element">
          <button
            mat-button
            color="primary"
            (click)="onClickEditLocalityByIdCity(element.id)"
            [disabled]="loading"
          >
            <mat-icon>edit</mat-icon>Editar
          </button>
          <button
            mat-button
            color="warn"
            (click)="onClickDeleteLocalityByIdCity(element.id)"
            [disabled]="loading"
          >
            <mat-icon>delete</mat-icon>Deletar
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 15]"
      [pageSize]="10"
      aria-label="Selecione a página de arquivos"
    ></mat-paginator>
  </div>

  <div *ngIf="loading" class="spinner-wrapper margin">
    <mat-spinner></mat-spinner>
  </div>
</div>
