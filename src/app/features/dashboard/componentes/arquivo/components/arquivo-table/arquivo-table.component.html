<div class="filtros">
  <mat-form-field appearance="outline">
    <mat-label>Buscar por titulo</mat-label>
    <input matInput (keyup.enter)="buscarArquivosPorTitulos($event)" placeholder="Buscar por titulo" #input>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Buscar pelo ID</mat-label>
    <input matInput (keyup.enter)="buscarArquivosPeloId($event)" placeholder="Buscar pelo ID" #input>
  </mat-form-field>
</div>

<div class="mat-elevation-z8 margin">
    <table mat-table [dataSource]="arquivoDataSource" matSort>
  
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{ element.id }} </td>
      </ng-container>
  
      <!-- Progress Column -->
      <ng-container matColumnDef="titulo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Título </th>
        <td mat-cell *matCellDef="let element"> {{element.titulo}} </td>
      </ng-container>
  
      <!-- Name Column -->
      <ng-container matColumnDef="anoPublicacao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Ano Publicação </th>
        <td mat-cell *matCellDef="let element"> {{element.ano_publicacao}} </td>
      </ng-container>
  
      <!-- Fruit Column -->
      <ng-container matColumnDef="cidade">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome Cidade </th>
        <td mat-cell *matCellDef="let element"> {{ element?.cidade?.nome_cidade }} </td>
      </ng-container>

      <ng-container matColumnDef="tipoArquivo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo Arquivo </th>
        <td mat-cell *matCellDef="let element"> {{element.tipo_arquivo.nome_tipo_arquivo}} </td>
      </ng-container>

      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Ação </th>
        <td *matCellDef="let element">
          <button mat-button color="primary" ><mat-icon>edit</mat-icon>Editar</button>
          <button mat-button color="warn"><mat-icon>delete</mat-icon>Deletar</button>
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  
    <mat-paginator 
    [pageSizeOptions]="[5, 10, 15]"
    [pageSize]="10"
    aria-label="Selecione a página de arquivos"></mat-paginator>
  </div>
