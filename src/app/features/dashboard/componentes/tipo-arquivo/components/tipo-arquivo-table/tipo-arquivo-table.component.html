<div class="mat-elevation-z8 table">
  <table mat-table [dataSource]="tipoArquivoDataSource" matSort>
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Progress Column -->
    <ng-container matColumnDef="tipoArquivo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Tipo Arquivo</th>
      <td mat-cell *matCellDef="let element">{{ element.nome_tipo_arquivo }}</td>
    </ng-container>

    <ng-container matColumnDef="acao">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Ação</th>
      <td *matCellDef="let element">
        <button mat-button color="primary">
          <mat-icon>edit</mat-icon>Editar
        </button>
        <button mat-button color="warn">
          <mat-icon>delete</mat-icon>Deletar
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 15]"
    [pageSize]="10"
    aria-label="Selecione a página de tipos arquivo"
  ></mat-paginator>
</div>
