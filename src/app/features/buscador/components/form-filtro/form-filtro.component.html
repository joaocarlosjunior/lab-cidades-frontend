<form class="busca-avancada"  [formGroup]="searchForm" (ngSubmit)="onSubmit()">
  <div class="content-busca-avancada" >
    <div class="form-filtro-body">
      <div formArrayName="filtros">
        <div *ngFor="let filtro of filtros.controls; let i = index">
          <app-filter
            [group]="filtro"
            [exibirOperador]="i > 0"
            [exibirBotaoRemover]="i > 0"
            (removeFiltro)="removeFiltro(i)"
            [formValid]="formValid"
          >
            ></app-filter
          >
        </div>
      </div>

      <div class="buttons">
        <button
          mat-stroked-button
          type="button"
          color="primary"
          (click)="addFiltro()"
          [disabled]="isAddFiltroDisabled"
        >
          <mat-icon>add</mat-icon>
          Adicionar Filtro
        </button>
      </div>
    </div>
    <div class="tipo-documento">
      <span style="text-wrap-mode: nowrap;">Tipo de Documento</span>
      <select formControlName="tipoDocumento">
        <option *ngFor="let tipoDocumento of tiposDocumentoOptions" [value]="tipoDocumento.id">
          {{ tipoDocumento.nome_tipo_documento }}
        </option>
      </select>
    </div>
  </div>

    <div class="form-card-footer" >
      <button mat-raised-button color="primary" type="submit">Buscar</button>
    </div>
</form>
